<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Digital Clock</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background-color: #f0f0f0;\n        }\n        .clock {\n            background: #fff;\n            padding: 20px;\n            border-radius: 8px;\n            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);\n            text-align: center;\n        }\n        .time {\n            font-size: 2em;\n        }\n    </style>\n</head>\n<body>\n    <div class="clock">\n        <h1>Digital Clock</h1>\n        <div class="time" id="clock"></div>\n        <div id="timezone"></div>\n    </div>\n    <script>\n        function updateClock() {\n            const now = new Date();\n            const options = {\n                timeZone: 'UTC',\n                hour: '2-digit',\n                minute: '2-digit',\n                second: '2-digit',\n                hour12: false\n            };\n            const utcTime = now.toLocaleString('en-US', options);\n            const estTime = now.toLocaleString('en-US', { timeZone: 'America/New_York', ...options });\n            const cstTime = now.toLocaleString('en-US', { timeZone: 'America/Chicago', ...options });\n            const pstTime = now.toLocaleString('en-US', { timeZone: 'America/Los_Angeles', ...options });\n            document.getElementById('clock').innerHTML = \\`UTC: ${utcTime} <br> EST: ${estTime} <br> CST: ${cstTime} <br> PST: ${pstTime}\`;\n        }\n        setInterval(updateClock, 1000);\n        updateClock();\n    </script>\n</body>\n</html>
